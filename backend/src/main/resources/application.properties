# Server Configuration
server.port=8080

# Optional local secrets file (do not commit): backend/.env or repo-root .env
# Format is Java .properties (KEY=VALUE). Example file: backend/.env.example
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:file:./data/ecommerce
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# For PostgreSQL in production, uncomment below and comment H2 settings:
# spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
# spring.datasource.username=postgres
# spring.datasource.password=your_password
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-make-it-long-and-secure-at-least-32-characters
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/products

# Cloudflare R2 (optional, S3-compatible)
# If enabled, uploaded images are stored in R2 and imageUrl becomes cloudflare.r2.public-base-url + "/" + objectKey.
cloudflare.r2.enabled=${CLOUDFLARE_R2_ENABLED:false}
cloudflare.r2.account-id=${CLOUDFLARE_R2_ACCOUNT_ID:}
cloudflare.r2.access-key-id=${CLOUDFLARE_R2_ACCESS_KEY_ID:}
cloudflare.r2.secret-access-key=${CLOUDFLARE_R2_SECRET_ACCESS_KEY:}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET:}
# Optional: override endpoint; default is https://<account-id>.r2.cloudflarestorage.com
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:}
# REQUIRED for serving images publicly (set to your public bucket/custom domain URL prefix)
cloudflare.r2.public-base-url=${CLOUDFLARE_R2_PUBLIC_BASE_URL:}
cloudflare.r2.key-prefix=${CLOUDFLARE_R2_KEY_PREFIX:products}

# M-Pesa Configuration (Sandbox)
mpesa.consumer-key=${MPESA_CONSUMER_KEY:YOUR_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET:YOUR_CONSUMER_SECRET}
mpesa.passkey=${MPESA_PASSKEY:YOUR_PASSKEY}
mpesa.shortcode=174379
mpesa.environment=sandbox
mpesa.callback-url=${MPESA_CALLBACK_URL:https://your-domain.com/api/mpesa/callback}

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

# Email Configuration (Gmail example - use app password, not regular password)
# For development, email verification is disabled by default
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@bluvberry.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App Configuration
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.email-verification.enabled=${EMAIL_VERIFICATION_ENABLED:false}
app.email-verification.expiration-hours=24

# Logging
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG
